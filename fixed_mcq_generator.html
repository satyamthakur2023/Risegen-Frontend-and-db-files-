<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiseGen - MCQ Generator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gradient); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; margin: 20px 0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn { padding: 14px 28px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .upload-zone { border: 3px dashed #e5e7eb; border-radius: 16px; padding: 60px 20px; text-align: center; transition: all 0.3s; }
        .upload-zone.dragover { border-color: var(--primary); background: #f0f9ff; }
        .hidden { display: none; }
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
        .topic-card { background: white; border: 2px solid #e5e7eb; border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.3s; }
        .topic-card.selected { border-color: var(--primary); background: #f0f9ff; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 60px; height: 60px; border: 6px solid #e5e7eb; border-top: 6px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: white; margin-bottom: 30px; font-size: 2.5rem;">
            <i class="fas fa-graduation-cap"></i> RiseGen MCQ Generator
        </h1>

        <!-- Upload Section -->
        <div class="card" id="uploadSection">
            <h2><i class="fas fa-upload"></i> Upload PDF</h2>
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-file-pdf" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h3>Drop PDF here or click to browse</h3>
                <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
                <button class="btn btn-primary" onclick="document.getElementById('pdfInput').click()">
                    Choose File
                </button>
            </div>
            <div id="fileInfo" class="hidden"></div>
            <button class="btn btn-success" id="analyzeBtn" onclick="analyzePDF()" disabled>
                Analyze PDF
            </button>
        </div>

        <!-- Loading -->
        <div class="card hidden" id="loadingSection">
            <div class="loading">
                <div class="spinner"></div>
                <h3>Processing PDF...</h3>
            </div>
        </div>

        <!-- Topics -->
        <div class="card hidden" id="topicSection">
            <h2><i class="fas fa-tags"></i> Select Topics</h2>
            <div id="topicGrid" class="topic-grid"></div>
            <button class="btn btn-success" onclick="generateQuestions()">Generate Questions</button>
        </div>

        <!-- Test -->
        <div class="card hidden" id="testSection">
            <h2>Question <span id="currentQ">1</span> of <span id="totalQ">10</span></h2>
            <div id="questionContainer"></div>
            <button class="btn btn-primary" onclick="nextQuestion()">Next</button>
        </div>

        <!-- Results -->
        <div class="card hidden" id="resultsSection">
            <h2><i class="fas fa-trophy"></i> Results</h2>
            <div id="scoreDisplay"></div>
            <button class="btn btn-success" onclick="resetApp()">New Test</button>
        </div>
    </div>

    <script>
        let currentPDF = null;
        let topics = [];
        let selectedTopics = [];
        let questions = [];
        let currentQ = 0;
        let answers = [];

        // File handling
        document.getElementById('pdfInput').addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please select a PDF file');
                return;
            }
            currentPDF = file;
            document.getElementById('fileInfo').innerHTML = `<p><strong>${file.name}</strong> (${(file.size/1024/1024).toFixed(2)} MB)</p>`;
            document.getElementById('fileInfo').classList.remove('hidden');
            document.getElementById('analyzeBtn').disabled = false;
        }

        async function analyzePDF() {
            showSection('loadingSection');
            
            const formData = new FormData();
            formData.append('pdf', currentPDF);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    topics = result.topics;
                    displayTopics();
                    showSection('topicSection');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                // Fallback mock data
                topics = [
                    {name: 'Technology', score: 0.9},
                    {name: 'Science', score: 0.8},
                    {name: 'Business', score: 0.7}
                ];
                displayTopics();
                showSection('topicSection');
            }
        }

        function displayTopics() {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = topics.map(topic => `
                <div class="topic-card" onclick="toggleTopic('${topic.name}')">
                    <h4>${topic.name}</h4>
                    <p>Relevance: ${Math.round(topic.score * 100)}%</p>
                </div>
            `).join('');
        }

        function toggleTopic(name) {
            const index = selectedTopics.indexOf(name);
            if (index > -1) {
                selectedTopics.splice(index, 1);
            } else {
                selectedTopics.push(name);
            }
            
            document.querySelectorAll('.topic-card').forEach(card => {
                const topicName = card.querySelector('h4').textContent;
                card.classList.toggle('selected', selectedTopics.includes(topicName));
            });
        }

        async function generateQuestions() {
            if (selectedTopics.length === 0) {
                alert('Please select at least one topic');
                return;
            }

            showSection('loadingSection');
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        topics: selectedTopics,
                        count: 10
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    questions = result.questions;
                    startTest();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                // Mock questions
                questions = Array.from({length: 10}, (_, i) => ({
                    question: `Sample question ${i + 1} about ${selectedTopics[0]}?`,
                    options: ['Option A', 'Option B', 'Option C', 'Option D'],
                    correct: 0
                }));
                startTest();
            }
        }

        function startTest() {
            currentQ = 0;
            answers = [];
            displayQuestion();
            showSection('testSection');
        }

        function displayQuestion() {
            const q = questions[currentQ];
            document.getElementById('currentQ').textContent = currentQ + 1;
            document.getElementById('totalQ').textContent = questions.length;
            
            document.getElementById('questionContainer').innerHTML = `
                <div style="margin: 20px 0;">
                    <h3>${q.question}</h3>
                    <div style="margin: 20px 0;">
                        ${q.options.map((opt, i) => `
                            <div style="margin: 10px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;" 
                                 onclick="selectAnswer(${i})">
                                ${String.fromCharCode(65 + i)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function selectAnswer(index) {
            answers[currentQ] = index;
            document.querySelectorAll('#questionContainer > div > div > div').forEach((opt, i) => {
                opt.style.background = i === index ? '#e3f2fd' : 'white';
            });
        }

        function nextQuestion() {
            if (currentQ < questions.length - 1) {
                currentQ++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            let correct = 0;
            questions.forEach((q, i) => {
                if (answers[i] === q.correct) correct++;
            });
            
            document.getElementById('scoreDisplay').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2>Score: ${correct}/${questions.length}</h2>
                    <p>Percentage: ${Math.round((correct/questions.length) * 100)}%</p>
                </div>
            `;
            showSection('resultsSection');
        }

        function showSection(id) {
            document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function resetApp() {
            currentPDF = null;
            topics = [];
            selectedTopics = [];
            questions = [];
            currentQ = 0;
            answers = [];
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('fileInfo').classList.add('hidden');
            showSection('uploadSection');
        }
    </script>
</body>
</html>
